server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets, but never cache the shell.
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # SPA fallback — every unknown route falls back to index.html so React
  # Router handles it client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy API to the backend service when running via compose.
  # Override/remove this block if frontend and backend live on different hosts.
  location /api/ {
    proxy_pass http://backend:5000/api/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Stripe webhook needs the raw body — nginx preserves it by default,
    # but make sure we don't re-buffer large payloads aggressively.
    proxy_request_buffering on;
    client_max_body_size 12m;
  }

  # Serve backend-uploaded assets through the same origin.
  location /uploads/ {
    proxy_pass http://backend:5000/uploads/;
  }
}
